# ProMix Quantization Config: Llama-3.1-70B (base) with ResQ settings
model:
  name: "unsloth/Llama-3.1-70B"
  type: "llama"

quantize:
  w_bits: 16
  a_bits: 4
  high_bits: 8
  low_bits: 2
  high_fraction: 0.125
  low_fraction: 0.0
  a_asym: true
  k_bits: 16
  v_bits: 16
  k_asym: true
  v_asym: true
  k_groupsize: 128
  v_groupsize: 128
  sparse_fraction: 0.0
  down_proj_blocksize: 256
  rotate_mode: "resq"
  rotation_granularity: "full_shared"
  w_clip: true

paths:
  basis: "./rotation/U-wikitext-512-Llama-3.1-70B.bin"
  rotation: "./rotation/R-high-0.125-low-0.0-sparse-0.0-Llama-3.1-70B.bin"
  output_dir: "/tmp/promix_ptq_70b_base"

calibration:
  dataset: "wikitext"
  nsamples: 512
  seqlen: 2048
  seed: 0

eval:
  tasks: []
  batch_size: 4
  num_fewshot: 0
  max_length: 2048
