# ProMix Quantization Config: Llama-3-8B (base) W4/A4 — paper W4A4 (KV not quantized)
model:
  name: "unsloth/llama-3-8b"
  type: "llama"

quantize:
  w_bits: 4
  a_bits: 4
  high_bits: 8
  low_bits: 2
  high_fraction: 0.125
  low_fraction: 0.0
  a_asym: true
  w_asym: false
  k_bits: 16
  v_bits: 16
  k_asym: true
  v_asym: true
  k_groupsize: 128
  v_groupsize: 128
  w_groupsize: -1
  w_clip: true
  percdamp: 0.01
  act_order: false
  sparse_fraction: 0.0
  down_proj_blocksize: 256
  rotate_mode: "resq"
  rotation_granularity: "full_shared"

paths:
  basis: "./rotation/U-wikitext-512-llama-3-8b.bin"
  rotation: "./rotation/R-high-0.125-low-0.0-sparse-0.0-llama-3-8b.bin"
  output_dir: "/tmp/promix_ptq_8b_w4a4"

calibration:
  dataset: "wikitext"
  nsamples: 128
  seqlen: 2048
  seed: 0

eval:
  tasks: []
  batch_size: 16
  num_fewshot: 0
  max_length: 2048
