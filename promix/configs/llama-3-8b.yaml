# ProMix Quantization Config: Meta-Llama-3-8B (base) with ResQ settings
model:
  name: "meta-llama/Meta-Llama-3-8B"
  type: "llama"

quantize:
  w_bits: 16
  a_bits: 4
  high_bits: 8
  low_bits: 2
  high_fraction: 0.125
  low_fraction: 0.0
  a_asym: true
  k_bits: 16
  v_bits: 16
  k_asym: true
  v_asym: true
  k_groupsize: 128
  v_groupsize: 128
  sparse_fraction: 0.0
  down_proj_blocksize: 256
  rotate_mode: "resq"
  rotation_granularity: "full_shared"
  w_clip: true

paths:
  basis: "./rotation/U-wikitext-512-Meta-Llama-3-8B.bin"
  rotation: "./rotation/R-high-0.125-low-0.0-sparse-0.0-Meta-Llama-3-8B.bin"
  output_dir: "/tmp/promix_ptq_8b_base"

calibration:
  dataset: "wikitext"
  nsamples: 512
  seqlen: 2048
  seed: 0

eval:
  tasks:
    - piqa
    - arc_easy
    - arc_challenge
    - hellaswag
    - winogrande
    - boolq
    - openbookqa
  batch_size: 8
  num_fewshot: 0
  max_length: 2048
